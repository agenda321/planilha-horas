<!DOCTYPE html>
<html lang="pt-BR">

        }

        }

            padding: 12px 30px;
            border-bottom: 3px solid #b28b5e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;

            border-radius: 28px 28px 18px 18px;

            gap: 15px;
        }

        }
        .planilha { width: 100%; border-collapse: collapse; background: #fff6e8; min-width: 1000px; }
        .planilha th, .planilha td { border: 1px solid #ebddbb; padding: 8px 4px; text-align: center; }
        .planilha th {
            background: linear-gradient(to bottom, #b88954, #7e5937);

        }

</head>

let DIAS = 30;
let isEditing = false;
let diaEditandoIndex = null;
let diaReferencia = null;
let password = "";

function parseHora(v) { if (!v) return 0; let n = parseFloat(String(v).trim().replace(',','.')); return isNaN(n) ? 0 : n; }
function formatarHora(n) { return n.toFixed(1).replace('.',','); }

function atualizarTotalLinha(row) {
    let inputs = row.querySelectorAll('.input-hora');
    let soma = 0;
    inputs.forEach(inp => { 
        if (!inp.disabled && inp.value !== "FS") {
            soma += parseHora(inp.value); 
        }
        inp.classList.toggle('has-value', parseHora(inp.value) > 0 && inp.value !== "FS");
    });
    let totalCell = row.querySelector('.total-cell');
    if (totalCell) { totalCell.textContent = formatarHora(soma); totalCell.setAttribute('data-valor-raw', soma); }
    return soma;
}

function validarStreaks() {
    document.querySelectorAll('#tabelaHoras tbody tr.membro-row').forEach(row => {
        const inputs = row.querySelectorAll('.input-hora');
        const vals = Array.from(inputs).map(inp => {
            if (inp.disabled || inp.value === "FS") return 0;
            return parseHora(inp.value) > 0 ? 1 : 0;
        });
        let streak = 0, seq = new Array(DIAS).fill(false);
        for (let i = 0; i < DIAS; i++) {
            if (vals[i]) { streak++; if (streak >= 6) for (let j = i - streak + 1; j <= i; j++) seq[j] = true; }
            else streak = 0;
        }
        inputs.forEach((inp, i) => inp.classList.toggle('streak-day', seq[i]));
        let nomeCell = row.querySelector('td:first-child');
        let icon = nomeCell.querySelector('.alert-icon');
        if (seq.some(v => v)) {
            if (!icon) { let ic = document.createElement('i'); ic.className = 'fas fa-exclamation-triangle alert-icon'; ic.title = '6+ dias consecutivos'; nomeCell.appendChild(ic); }
        } else if (icon) icon.remove();
    });
}

function recalcularTudo() {
    let somaGeral = 0;
    document.querySelectorAll('#tabelaHoras tbody tr.membro-row').forEach(row => somaGeral += atualizarTotalLinha(row));
    let tfoot = document.getElementById('tfootTotal'); tfoot.innerHTML = '';
    let tr = document.createElement('tr');
    tr.innerHTML = `<td style="font-weight:bold">🏁 TOTAL GERAL</td>${'<td></td>'.repeat(DIAS)}<td class="total-geral">${formatarHora(somaGeral)}</td>`;
    tfoot.appendChild(tr);
    validarStreaks();
    atualizarTotaisBotoesDias();
}

function totalHorasDia(diaIndex) {
    let soma = 0;
    document.querySelectorAll('#tabelaHoras tbody tr.membro-row').forEach(row => {
        const inp = row.cells[diaIndex + 1]?.querySelector('.input-hora');
        if (inp && !inp.disabled && inp.value !== "FS") soma += parseHora(inp.value);
    });
    return soma;
}

function atualizarTotaisBotoesDias() {
    const btns = document.querySelectorAll('.btn-dia');
    btns.forEach((btn, i) => {
        const total = totalHorasDia(i);
        const labelEl = btn.querySelector('.dia-total');
        if (labelEl) labelEl.textContent = total > 0 ? formatarHora(total) + 'h' : '';
        btn.classList.toggle('tem-dados', total > 0);
    });
}

function sairEdicaoDia() {
    if (diaEditandoIndex !== null) {
        diaEditandoIndex = null;
        document.querySelectorAll('.input-hora').forEach(inp => {
            if (!inp.disabled || inp.value === "FS") {

            }
        });
        document.getElementById('badgeDiaEdicao').classList.remove('visivel');
        document.getElementById('btnSairDia').style.display = 'none';
        document.querySelectorAll('.btn-dia').forEach(btn => btn.classList.remove('dia-editando'));
        limparDestaqueColuna();
    }
}

function ativarEdicaoDia(diaIndex) {
    if (diaEditandoIndex !== null && diaEditandoIndex !== diaIndex) sairEdicaoDia();
    diaEditandoIndex = diaIndex;
    document.querySelectorAll('.input-hora').forEach(inp => inp.disabled = true);
    document.querySelectorAll('#tabelaHoras tbody tr.membro-row').forEach(row => {
        const inp = row.cells[diaIndex + 1]?.querySelector('.input-hora');
        if (inp && inp.value !== "FS") inp.disabled = false;
    });
    destacarColuna(diaIndex);
    const diaNum = String(diaIndex + 1).padStart(2, '0');
    document.getElementById('badgeDiaEdicao').textContent = `✏️ EDITANDO DIA ${diaNum}`;
    document.getElementById('badgeDiaEdicao').classList.add('visivel');
    document.getElementById('btnSairDia').style.display = 'inline-block';
    document.querySelectorAll('.btn-dia').forEach((btn, i) => btn.classList.toggle('dia-editando', i === diaIndex));
}

function destacarColuna(diaIndex) {
    limparDestaqueColuna();
    const colIdx = diaIndex + 1;
    const ths = document.querySelectorAll('#tableHeader tr th');
    if (ths[colIdx]) ths[colIdx].classList.add('col-ativa');
    document.querySelectorAll('#tabelaHoras tbody tr').forEach(row => {
        if (row.cells[colIdx]) row.cells[colIdx].classList.add('col-ativa');
    });
}

function limparDestaqueColuna() { document.querySelectorAll('.col-ativa').forEach(el => el.classList.remove('col-ativa')); }

function mostrarComparativoDia(diaIndex) {
    const diaNumero = diaIndex + 1;
    const dadosDia = {};
    document.querySelectorAll('#tabelaHoras tbody tr.membro-row').forEach(row => {
        const nome = row.cells[0].innerText.trim();
        const inp = row.cells[diaIndex + 1]?.querySelector('.input-hora');
        dadosDia[nome] = (inp && !inp.disabled && inp.value !== "FS") ? parseHora(inp.value) : 0;
    });
    const gruposMap = {};
    document.querySelectorAll('#tabelaHoras tbody tr.membro-row').forEach(row => {
        const nome = row.cells[0].innerText.trim();
        let grupo = "CESSNA 206/210";
        if (["Cleiton","Joao","Pascoal","Lindomar","Perisson","Rui","Yago"].includes(nome)) grupo = "CARAVAN";
        else if (["Cauê","Felipe","Ruben","Ernesto","Daniela","Thales","Serafim","Ronaldo","Rodrigo","Tiago"].includes(nome)) grupo = "COPILOTO";
        if (!gruposMap[grupo]) gruposMap[grupo] = [];
        gruposMap[grupo].push({ nome, horas: dadosDia[nome] || 0 });
    });
    let html = `<div class="card-detalhe"><h2>📅 Dia ${String(diaNumero).padStart(2,'0')}</h2>`;
    for (let grupo in gruposMap) {
        let lista = gruposMap[grupo].sort((a,b)=>b.horas - a.horas);
        const media = lista.reduce((s,p)=>s+p.horas,0)/lista.length;
        html += `<h3>${grupo}</h3><p>Média: ${formatarHora(media)} h</p><table class="tabela-detalhe">`;
        lista.forEach(p => {
            const diff = p.horas - media;
            html += `<tr><td style="text-align:left">${p.nome}</td><td style="color:${p.horas===0?'#aaa':'#000'}">${p.horas===0?'—':formatarHora(p.horas)}</td><td style="color:${diff>=0?'green':'red'}">${diff>=0?'+':''}${formatarHora(diff)}</td></tr>`;
        });
        html += `</table><hr>`;
    }
    html += `<button class="btn-fechar" id="fecharDetalhe">Fechar</button></div>`;
    const modal = document.createElement('div'); modal.className = 'modal-detalhe'; modal.innerHTML = html;
    document.body.appendChild(modal);
    modal.querySelector('#fecharDetalhe').onclick = () => modal.remove();
    modal.onclick = e => { if (e.target === modal) modal.remove(); };
}

async function mostrarDisponiveis() {
    if (diaReferencia === null) { alert("Selecione um dia de referência clicando em um dos botões."); return; }
    let diaSeguinte = diaReferencia + 1;
    if (diaSeguinte >= DIAS) { alert("Último dia do mês. Não há dia seguinte para consulta."); return; }
    try {
        const res = await fetch(`/api/available_commanders/${diaSeguinte}`);
        const data = await res.json();
        let html = `<div class="card-detalhe"><h2>👥 Cmtes Disponíveis - Dia ${String(diaSeguinte+1).padStart(2,'0')}</h2>`;
        for (let grupo in data) {
            if (data[grupo].length > 0) {
                html += `<h3>${grupo}</h3><ul>`;
                data[grupo].forEach(c => html += `<li>${c.name} (${c.status})</li>`);
                html += `</ul>`;
            } else {
                html += `<h3>${grupo}</h3><p>Nenhum piloto disponível.</p>`;
            }
        }
        html += `<button class="btn-fechar" id="fecharDisponiveis">Fechar</button></div>`;
        const modal = document.createElement('div'); modal.className = 'modal-detalhe'; modal.innerHTML = html;
        document.body.appendChild(modal);
        modal.querySelector('#fecharDisponiveis').onclick = () => modal.remove();
        modal.onclick = e => { if (e.target === modal) modal.remove(); };
    } catch(e) { alert("Erro ao carregar disponíveis"); }
}

async function carregarDoBackend() {
    try {
        const res = await fetch('/api/data');
        const data = await res.json();
        const pilots = data.pilots;
        const logs = data.logs;
        
        const thead = document.getElementById('tableHeader');
        thead.innerHTML = `<tr><th>👤 PILOTO</th>${Array.from({length:DIAS},(_,i)=>`<th>${String(i+1).padStart(2,'0')}</th>`).join('')}<th>⭐ TOTAL</th></tr>`;
        
        const tbody = document.getElementById('planilhaBody');
        tbody.innerHTML = '';
        
        const grupos = { "CESSNA 206/210": [], "CARAVAN": [], "COPILOTO": [] };
        pilots.forEach(p => grupos[p.group].push(p));
        
        for (let grupo of ["CESSNA 206/210", "CARAVAN", "COPILOTO"]) {
            const titleRow = document.createElement('tr');
            titleRow.classList.add('group-title-row');
            titleRow.innerHTML = `<td colspan="${DIAS+2}"><i class="fas fa-${grupo === "COPILOTO" ? "headset" : "plane"}"></i> ${grupo}</td>`;
            tbody.appendChild(titleRow);
            
            for (let p of grupos[grupo]) {
                const row = document.createElement('tr');
                row.classList.add('membro-row');
                const nomeCell = document.createElement('td');
                nomeCell.textContent = p.name;
                row.appendChild(nomeCell);
                let total = 0;
                for (let i = 0; i < DIAS; i++) {
                    const td = document.createElement('td');
                    const inp = document.createElement('input');
                    inp.type = 'text';
                    inp.classList.add('input-hora');
                    inp.placeholder = '0,0';
                    
                    // VERIFICA SE É FOLGA SOCIAL (FS)
                    const status = ESCALA_MENSAL[p.name]?.[i] || "";
                    if (status === "FS") {
                        inp.disabled = true;
                        inp.classList.add("folga-social");
                        inp.value = "FS";
                    } else {
                        const valor = logs[p.name]?.[i+1] || 0;
                        inp.value = formatarHora(valor);
                        total += valor;
                    }
                    
                    inp.addEventListener('input', function() { 
                        if ((diaEditandoIndex !== null || isEditing) && this.value !== "FS") { 
                            atualizarTotalLinha(row); 
                            recalcularTudo(); 
                            if(isEditing && password) salvarNoBackend(); 
                        } 
                    });
                    inp.addEventListener('blur', function() { 
                        if ((diaEditandoIndex !== null || isEditing) && this.value !== "FS") { 
                            let v = parseHora(this.value); 
                            this.value = formatarHora(v); 
                            atualizarTotalLinha(row); 
                            recalcularTudo(); 
                            if(isEditing && password) salvarNoBackend();
                        } 
                    });
                    td.appendChild(inp);
                    row.appendChild(td);
                }
                const totalCell = document.createElement('td');
                totalCell.classList.add('total-cell');
                totalCell.textContent = formatarHora(total);
                row.appendChild(totalCell);
                tbody.appendChild(row);
            }
        }
        recalcularTudo();
        criarBotoesDias();
        sairEdicaoDia();
    } catch(e) { console.error(e); }
}

async function salvarNoBackend() {
    if (!isEditing || !password) return;
    const logs = {};
    document.querySelectorAll('#tabelaHoras tbody tr.membro-row').forEach(row => {
        const nome = row.cells[0].innerText.trim();
        logs[nome] = {};
        row.querySelectorAll('.input-hora').forEach((inp, i) => {
            if (!inp.disabled && inp.value !== "FS") {
                const val = parseHora(inp.value);
                if (val > 0) logs[nome][i+1] = val;
            }
        });
    });
    try {
        await fetch('/api/data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password, logs }) });
        const syncSpan = document.getElementById('syncStatus');
        if(syncSpan) { syncSpan.innerHTML = '✅ Salvo'; setTimeout(() => syncSpan.innerHTML = '💾 Sincronizado', 2000); }
    } catch(e) { const syncSpan = document.getElementById('syncStatus'); if(syncSpan) syncSpan.innerHTML = '❌ Erro ao salvar'; }
}

function criarBotoesDias() {
    const container = document.getElementById('botoesDias');
    container.innerHTML = '';
    for (let i = 0; i < DIAS; i++) {
        const btn = document.createElement('button');
        btn.classList.add('btn-dia');
        btn.innerHTML = `<span class="dia-num">${String(i+1).padStart(2,'00')}</span><span class="dia-total"></span>`;
        btn.onclick = () => {
            if (diaReferencia !== null) {
                const btnAntigo = document.querySelector(`.btn-dia[data-dia="${diaReferencia}"]`);
                if (btnAntigo) btnAntigo.classList.remove('dia-selecionado');
            }
            diaReferencia = i;
            btn.classList.add('dia-selecionado');
            btn.setAttribute('data-dia', i);
            if (isEditing) {
                ativarEdicaoDia(i);
            } else {
                mostrarComparativoDia(i);
            }
        };
        container.appendChild(btn);
    }
    atualizarTotaisBotoesDias();
}

async function login() {
    const p = prompt("Digite a senha:");
    try {
        const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: p }) });
        if (res.ok) {
            password = p;
            isEditing = true;
            document.getElementById('statusBadge').innerHTML = '🔓 EDIÇÃO ATIVA';
            document.getElementById('editModeChip').innerHTML = '✏️ EDIÇÃO ATIVO';
            document.getElementById('btnLimpar').disabled = false;
            document.getElementById('btnBloquear').disabled = false;
            alert("✅ Modo edição ativado. Clique em um dia para editar apenas aquela coluna.");
        } else { alert("❌ Senha incorreta."); }
    } catch(e) { alert("Erro de conexão"); }
}

function bloquear() {
    if (!isEditing) alert("Já está em modo leitura.");
    else {
        isEditing = false;
        password = "";
        sairEdicaoDia();
        document.querySelectorAll('.input-hora').forEach(inp => {
            if (inp.value !== "FS") inp.disabled = true;
        });
        document.getElementById('statusBadge').innerHTML = '🔒 SOMENTE LEITURA';
        document.getElementById('editModeChip').innerHTML = '📖 MODO VISUALIZAÇÃO';
        document.getElementById('btnLimpar').disabled = true;
        document.getElementById('btnBloquear').disabled = true;
        alert("Modo leitura ativado.");
    }
}

function limpar() {
    if (!isEditing) return alert("Desbloqueie primeiro.");
    if (confirm("Limpar todos os valores?")) {
        document.querySelectorAll('.input-hora').forEach(inp => {
            if (inp.value !== "FS") inp.value = '0,0';
        });
        recalcularTudo();
        salvarNoBackend();
    }
}

document.getElementById('btnDesbloquear').onclick = login;
document.getElementById('btnBloquear').onclick = bloquear;
document.getElementById('btnLimpar').onclick = limpar;
document.getElementById('btnSairDia').onclick = sairEdicaoDia;
document.getElementById('btnDisponiveis').onclick = mostrarDisponiveis;

carregarDoBackend();
</script>
