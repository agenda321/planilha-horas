services:
  - type: web
    name: planilha-voo
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: planilha_db
          property: connectionString
      - key: EDIT_PASSWORD
        value: Emerson
    autoDeploy: true

databases:
  - name: planilha_db
    plan: free
